# =====================================
# 博客基础信息
# =====================================

# 头像
avatar:
  img: /img/avatar.png
  effect: true  # 头像悬浮效果

# 站点名称旁边的图标 (fontawesome)
site_icon: 
  enable: true
  icon: fas fa-blog

# =====================================
# 导航菜单
# =====================================

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart
  友链: /link/ || fas fa-link

# =====================================
# 页脚设置
# =====================================

footer:
  owner:
    enable: true
    since: 2026  # 博客开始年份
  copyright: # 版权信息，留空则自动生成
  custom_text: # 自定义页脚文字

# =====================================
# 侧边栏设置
# =====================================

aside:
  enable: true
  position: right  # left 或 right
  card_author:
    enable: true
    description: 这里是你的个人简介
    button:
      enable: true
      icon: fab fa-github
      text: 我的GitHub
      link: https://github.com/你的用户名
  card_announcement:
    enable: true
    content: 欢迎来到我的小站！<br>这里记录着我的学习和生活。
  card_recent_post:
    enable: true
    limit: 5  # 显示最近几篇文章
  card_categories:
    enable: true
    limit: 8  # 显示几个分类
  card_tags:
    enable: true
    limit: 20  # 显示几个标签
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# =====================================
# 背景和外观
# =====================================

# 网站背景
background:
  enable: true
  # 纯色背景
  # color: '#f0f2f5'
  # 渐变色背景
  # color: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
  # 图片背景（如果使用图片，把上面的 color 注释掉）
  image: /img/bg.png


# 代码块主题
highlight_theme: atom-one-light  # 可选: darker / pale night / light / ocean / mac / mac light / atom-one-dark / atom-one-light

# 复制代码提示
copy_btn: true

# =====================================
# 文章相关
# =====================================

# 文章封面图
post_meta:
  page:
    date_type: both  # created / updated / both
    categories: true
    tags: true
  post:
    date_type: both
    categories: true
    tags: true

# 文章底部版权信息
post_copyright:
  enable: true
  decode: true
  author_href: https://github.com/你的用户名
  license: CC BY-NC 4.0
  license_href: https://creativecommons.org/licenses/by-nc/4.0/

# 赞赏功能（可选）
reward:
  enable: false
  # qrcode: /img/wechat.png
  # qrcode2: /img/alipay.png

# 文章字数统计/阅读时长
wordcount:
  enable: true
  count: true
  time: true

# 相关文章推荐
related_post:
  enable: true
  limit: 5  # 推荐数量
  date_type: created  # created 或 updated

# =====================================
# 加载动画（吃豆人在这里关）
# =====================================

preloader:
  enable: false  # 👈 false = 关闭吃豆人
  # 可选其他动画: pacman (吃豆人) / progress (进度条) / circle (圆圈)
  # 如果还想保留加载动画，把上面的 enable 改成 true，下面选一个
  # load_style: pacman  # 可选: pacman / progress / circle
  # pace_css_url: 

# =====================================
# 右下角按钮
# =====================================

rightside:
  enable: true
  comment: true  # 显示评论按钮
  share: true    # 显示分享按钮

# =====================================
# 搜索功能
# =====================================

local_search:
  enable: true
  preload: false
  top_n_per_article: 1

# =====================================
# 评论系统（推荐 Giscus）
# =====================================

comments:
  use: 
    - Giscus
  # 使用 Giscus 需要配置（基于 GitHub Discussions）
giscus:
  enable: false  # 想用就改成 true
  repo: 你的用户名/仓库名
  repo_id: 
  category_id: 
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 1
  input_position: bottom
  theme: light
  lang: zh-CN

# =====================================
# 社交图标
# =====================================

social:
  github: https://github.com/你的用户名 || fab fa-github
  # twitter: https://twitter.com/你的用户名 || fab fa-twitter
  # 邮箱: mailto:你的邮箱@example.com || fas fa-envelope

# =====================================
# 顶部图设置
# =====================================

index_top_img: true  # 首页顶部图开关
default_top_img: https://picsum.photos/1920/400?random=1  # 默认顶部图
archive_top_img: https://picsum.photos/1920/400?random=2   # 归档页顶部图
tag_top_img: https://picsum.photos/1920/400?random=3       # 标签页顶部图
category_top_img: https://picsum.photos/1920/400?random=4  # 分类页顶部图

# =====================================
# 字体设置（可选）
# =====================================

# font:
#   font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif
#   code-font: consolas, 'Courier New', monospace


# =====================================
# 懒加载
# =====================================

lazyload:
  enable: true
  loading: /img/loading.gif
