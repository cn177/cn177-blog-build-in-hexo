# =====================================
# 博客基础信息与头像
# =====================================
avatar:
  img: /img/avatar.png
  effect: true

subtitle:
  enable: true
  text1: 欢迎来到我的博客
  text2: 记录生活与技术

favicon: /img/favicon-32x32.png

# =====================================
# 导航菜单
# =====================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart

# =====================================
# 侧边栏设置
# =====================================
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 这是蛋堡 也叫软嘴唇.
    button:
      - enable: true
        icon: fab fa-github
        text: GitHub
        link: https://github.com/cn177
      - enable: true
        icon: fas fa-tv
        text: Bilibili
        link: https://space.bilibili.com/515843270
  card_announcement:
    enable: true
    content: 这是公告<br>但我不知道该写啥<br>个人介绍请见<br>『关于我... 请你注意我是软嘴唇』
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 20
  card_webinfo:
    enable: true

# =====================================
# 文章相关
# =====================================
post_copyright:
  enable: true
  license: CC BY-NC 4.0

post_end:
  enable: true
  content: ---------- 本文结束 ❤️ 感谢阅读 ----------

copy_btn: true
highlight_theme: atom-one-dark

# =====================================
# 页脚与社交
# =====================================
footer:
  owner:
    enable: true
    since: 2026
  copyright: true
  custom_text: ' '

social:
  github: https://github.com/cn177 || fab fa-github

rightside:
  enable: true
  comment: true
  share: true

# =====================================
# 加载动画与背景
# =====================================
preloader:
  enable: false

# 背景图与页脚运行时间的 JavaScript 注入
inject:
  head:
    - '<style>
        #page-header,
        .author-info__inner,
        .author-info {
          background-image: url(/img/bg.png) !important;
          background-size: cover !important;
          background-position: center !important;
          background-repeat: no-repeat !important;
        }
        .post-content::after {
          content: "---------- 本文结束 ❤️ 感谢阅读 ----------";
          display: block;
          text-align: center;
          margin: 40px 0 20px;
          font-size: 14px;
          color: #999;
        }
      </style>'
  bottom:
    - '<script>
        (function() {
          const startDate = new Date("2026/04/01");
          const now = new Date();
          const days = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
          window.addEventListener("DOMContentLoaded", function() {
            const footerInner = document.querySelector(".footer__inner, .footer-inner, footer .copyright");
            if (footerInner) {
              const runtimeDiv = document.createElement("div");
              runtimeDiv.style.marginTop = "8px";
              runtimeDiv.style.fontSize = "90%";
              runtimeDiv.style.opacity = "0.8";
              runtimeDiv.innerText = `已艰难运行 ${days} 天 | 你怎么看到这里了Ovo`;
              footerInner.appendChild(runtimeDiv);
            }
          });
        })();
      </script>'
