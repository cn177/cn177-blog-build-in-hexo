# =====================================
# 博客基础信息与头像
# =====================================
avatar:
  img: /img/avatar.png
  effect: true

subtitle:
  enable: true
  text1: 欢迎来到我的博客
  text2: 记录生活与技术

favicon: /img/favicon-32x32.png

# =====================================
# 导航菜单
# =====================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart

# =====================================
# 侧边栏设置
# =====================================
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 这是蛋堡 也叫软嘴唇.
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/cn177
  card_announcement:
    enable: true
    content: 这是公告<br>但我不知道该写啥<br>个人介绍请见<br>『关于我... 请你注意我是软嘴唇』
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 20
  card_webinfo:
    enable: true

# =====================================
# 文章相关
# =====================================
post_copyright:
  enable: true
  license: CC BY-NC 4.0

post_end:
  enable: true
  content: ---------- 本文结束 ❤️ 感谢阅读 ----------

copy_btn: true
highlight_theme: atom-one-dark

# =====================================
# 页脚与社交
# =====================================
footer:
  owner:
    enable: true
    since: 2026
  copyright: true
  custom_text: ' '

social:
  github: https://github.com/cn177 || fab fa-github

rightside:
  enable: true
  comment: true
  share: true

# =====================================
# 加载动画与背景
# =====================================
preloader:
  enable: false

# 背景图与页脚运行时间的 JavaScript 注入
inject:
  head:
    - '<style>
        #page-header,
        .author-info__inner,
        .author-info {
          background-image: url(/img/bg.png) !important;
          background-size: cover !important;
          background-position: center !important;
          background-repeat: no-repeat !important;
        }
        .post-content::after {
          content: "---------- 本文结束 ❤️ 感谢阅读 ----------";
          display: block;
          text-align: center;
          margin: 40px 0 20px;
          font-size: 14px;
          color: #999;
        }
      </style>'
  bottom:
    - '<div style="text-align: center; margin: 20px 0 10px;">
         <style>
           .blog-buttons {
             display: flex;
             flex-wrap: wrap;
             justify-content: center;
             gap: 12px;
             margin-top: 15px;
           }
           .blog-btn {
             display: inline-flex;
             align-items: center;
             gap: 8px;
             padding: 8px 18px;
             border-radius: 40px;
             font-size: 13px;
             font-weight: 500;
             text-decoration: none;
             transition: all 0.3s ease;
             box-shadow: 0 2px 5px rgba(0,0,0,0.1);
           }
           .blog-btn:hover {
             transform: translateY(-3px);
             box-shadow: 0 5px 15px rgba(0,0,0,0.2);
           }
           .btn-github { background: #24292e; color: white; }
           .btn-github:hover { background: #2f363d; }
           .btn-bilibili { background: #fb7299; color: white; }
           .btn-bilibili:hover { background: #fc8dae; }
           .btn-hexo { background: #0e83cd; color: white; }
           .btn-hexo:hover { background: #1a9cf0; }
           .btn-butterfly { background: #ff7c7c; color: white; }
           .btn-butterfly:hover { background: #ff9696; }
           .blog-btn i { font-size: 16px; }
         </style>
         <div class="blog-buttons">
           <a href="https://github.com/cn177" target="_blank" class="blog-btn btn-github">
             <i class="fab fa-github"></i> GitHub
           </a>
           <a href="https://space.bilibili.com/515843270" target="_blank" class="blog-btn btn-bilibili">
             <i class="fab fa-bilibili"></i> 哔哩哔哩
           </a>
           <a href="https://github.com/hexojs/hexo" target="_blank" class="blog-btn btn-hexo">
             <i class="fab fa-github"></i> Hexo
           </a>
           <a href="https://github.com/jerryc127/hexo-theme-butterfly" target="_blank" class="blog-btn btn-butterfly">
             <i class="fab fa-github"></i> Butterfly
           </a>
         </div>
       </div>'
