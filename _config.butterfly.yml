avatar:
  img: /img/avatar.png
  effect: true

subtitle:
  enable: true
  text1: 欢迎来到我的博客
  text2: 记录生活与技术

preloader:
  enable: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart

aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 这是蛋堡 也叫软嘴唇.
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/cn177
  card_announcement:
    enable: true
    content: 这是公告<br>但我不知道该写啥<br>个人介绍请见<br>『关于我... 请你注意我是软嘴唇』
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 20
  card_webinfo:
    enable: true

post_copyright:
  enable: true
  license: CC BY-NC 4.0

rightside:
  enable: true
  comment: true
  share: true

copy_btn: true
highlight_theme: atom-one-dark

post_end:
  enable: true
  content: ---------- 本文结束 ❤️ 感谢阅读 ----------

social:
  github: https://github.com/cn177 || fab fa-github

inject:
  head:
    - '<style>
        #page-header,
        .author-info__inner,
        .author-info {
          background-image: url(/img/bg.png) !important;
          background-size: cover !important;
          background-position: center !important;
          background-repeat: no-repeat !important;
        }
      </style>'
  bottom:
    - '<script>
        (function() {
          // 计算运行天数
          const startDate = new Date("2026/04/01");
          const now = new Date();
          const days = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
          
          // 等待页面加载完成
          window.addEventListener("DOMContentLoaded", function() {
            // 查找页脚容器
            const footerInner = document.querySelector(".footer__inner");
            if (footerInner) {
              // 创建运行时间元素
              const runtimeDiv = document.createElement("div");
              runtimeDiv.style.marginTop = "10px";
              runtimeDiv.style.fontSize = "14px";
              runtimeDiv.style.opacity = "0.8";
              runtimeDiv.innerHTML = `已艰难运行 ${days} 天 | 你怎么看到这里了Ovo`;
              footerInner.appendChild(runtimeDiv);
            } else {
              // 备用方案：直接追加到 footer 里
              const footer = document.querySelector("footer");
              if (footer) {
                const runtimeDiv = document.createElement("div");
                runtimeDiv.style.textAlign = "center";
                runtimeDiv.style.padding = "10px";
                runtimeDiv.innerHTML = `已艰难运行 ${days} 天 | 你怎么看到这里了Ovo`;
                footer.appendChild(runtimeDiv);
              }
            }
          });
        })();
      </script>'
      footer:
  owner:
    enable: true
    since: 2026
  copyright: true
  custom_text:   # 留空
favicon: /img/favicon-32x32.png   # 👈 指向你的图标文件
