avatar:
  img: /img/avatar.png
  effect: true
subtitle:
  enable: true
  text1: 欢迎来到我的博客
  text2: 记录生活与技术
preloader:
  enable: false
  # =====================================
# 导航菜单
# =====================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart
  # =====================================
# 侧边栏设置
# =====================================

aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 这是蛋堡 也叫软嘴唇.
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/cn177
  card_announcement:
    enable: true
    content: 这是公告<br>但我不知道该写啥<br>个人介绍请见<br>『关于我... 请你注意我是软嘴唇』
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 20
  card_webinfo:
    enable: true
# =====================================
# 文章相关
# =====================================

post_copyright:
  enable: true
  license: CC BY-NC 4.0

# =====================
# background
# 首页顶部图开关
index_top_img: true

# 默认顶部图（当你没有为单独页面设置时显示）
default_top_img: /img/bg.jpg
