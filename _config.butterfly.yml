# =====================================
# 博客基础信息与头像
# =====================================
avatar:
  img: /img/avatar.png
  effect: true

subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - 汗は君のために流れる.————POCARI SWEET

favicon: /img/favicon-32x32.png

# =====================================
# 导航菜单
# =====================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart

# =====================================
# 侧边栏设置
# =====================================
aside:
  enable: true
  position: right
  card_author:
    enable: true
    description: 这是蛋堡 也叫软嘴唇.
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/cn177
  card_announcement:
    enable: true
    content: 这是公告<br>但我不知道该写啥<br>个人介绍请见<br>『关于我... 请你注意我是软嘴唇』
  card_recent_post:
    enable: true
    limit: 5
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 20
  card_webinfo:
    enable: true

# =====================================
# 文章相关
# =====================================
post_copyright:
  enable: true
  license: CC BY-NC 4.0

post_end:
  enable: true
  content: ---------- 本文结束 ❤️ 感谢阅读 ----------

copy_btn: true
highlight_theme: atom-one-dark

# =====================================
# 页脚与社交
# =====================================
footer:
  owner:
    enable: true
    since: 2026
  copyright: true
  custom_text: ' '

social:
  github: https://github.com/cn177 || fab fa-github

rightside:
  enable: true
  comment: true
  share: true

# =====================================
# 加载动画与背景
# =====================================
preloader:
  enable: false
#pjax
pjax:
  enable: true
# 背景图与页脚运行时间的 JavaScript 注入 还有神秘字体
inject:
  head:
    # 加载英文字体 Rajdhani
    - '<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">'
    # 加载开源文艺字体“霞鹜文楷”作为正文默认字体
    - '<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.6.0/style.css" rel="stylesheet">'
    # 加载得意黑字体（副标题专用）
    - '<link href="https://fonts.googleapis.com/css2?family=Smiley+Sans&display=swap" rel="stylesheet">'
    # 注入全局样式
    - '<style>
        /* 全局基础字体：加粗版本 */
        body {
          font-family: "Rajdhani", "LXGW WenKai Screen", "Noto Sans SC", "Microsoft YaHei", sans-serif !important;
          font-weight: 500 !important;  /* 全局加粗，500 = 中等粗细 */
        }
        /* 段落文字稍微轻一点，保持可读性 */
        p, .post-content, .article-content {
          font-weight: 450 !important;
        }
        /* 标题、文章标题强制使用宋体 + 加粗 */
        #site-title,
        .post-title,
        .page-title,
        .archive-title,
        .category-title,
        .tag-title,
        h1, h2, h3, h4, h5, h6 {
          font-family: "SimSun", "Times New Roman", serif !important;
          font-weight: 700 !important;  /* 标题更粗 */
        }
        /* 副标题：使用得意黑 + 加粗 */
        #site-subtitle {
          font-family: "Smiley Sans", "LXGW WenKai Screen", sans-serif !important;
          font-weight: 600 !important;
          letter-spacing: 1px;
          font-size: 1.2rem;
        }
        /* 代码块保持专业等宽字体 */
        code, pre, .code-content {
          font-family: "JetBrains Mono", "Fira Code", monospace !important;
          font-weight: 400;
        }
        /* 导航菜单加粗 */
        .menus_item a, .menu-item a {
          font-weight: 500 !important;
        }
        /* 侧边栏文字加粗 */
        .aside-content .card-announcement,
        .aside-content .card_author .description {
          font-weight: 450 !important;
        }
        /* 你的原有背景样式 */
        #page-header,
        .author-info__inner,
        .author-info {
          background-image: url(/img/bg.png) !important;
          background-size: cover !important;
          background-position: center !important;
          background-repeat: no-repeat !important;
        }
        /* 文章结束标记样式 */
        .post-content::after {
          content: "---------- 本文结束 ❤️ 感谢阅读 ----------";
          display: block;
          text-align: center;
          margin: 40px 0 20px;
          font-size: 14px;
          color: #999;
          font-weight: 400;
        }
      </style>'
  bottom:
    # 运行时间 JS
    - '<script>
        (function() {
          const startDate = new Date("2026/04/01");
          const now = new Date();
          const days = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
          window.addEventListener("DOMContentLoaded", function() {
            const footerInner = document.querySelector(".footer__inner, .footer-inner, footer .copyright");
            if (footerInner) {
              const runtimeDiv = document.createElement("div");
              runtimeDiv.style.marginTop = "8px";
              runtimeDiv.style.fontSize = "90%";
              runtimeDiv.style.opacity = "0.8";
              runtimeDiv.innerText = `已艰难运行 ${days} 天 | 你怎么看到这里了Ovo`;
              footerInner.appendChild(runtimeDiv);
            }
          });
        })();
      </script>'
    # MetingJS 播放器（完整歌单版）
    - '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
       <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
       <script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>
       <meting-js
           server="netease"
           type="playlist"
           id="10119507937"
           fixed="true"
           autoplay="false"
           loop="all"
           order="list"
           preload="auto"
           volume="0.7"
           list-folded="false">
       </meting-js>'
    # 四个圆角按钮
    - '<div style="text-align: center; margin: 20px 0 10px;">
         <style>
           .blog-buttons {
             display: flex;
             flex-wrap: wrap;
             justify-content: center;
             gap: 12px;
             margin-top: 15px;
           }
           .blog-btn {
             display: inline-flex;
             align-items: center;
             gap: 8px;
             padding: 8px 18px;
             border-radius: 40px;
             font-size: 13px;
             font-weight: 500;
             text-decoration: none;
             transition: all 0.3s ease;
             box-shadow: 0 2px 5px rgba(0,0,0,0.1);
             font-family: "Rajdhani", sans-serif;
           }
           .blog-btn:hover {
             transform: translateY(-3px);
             box-shadow: 0 5px 15px rgba(0,0,0,0.2);
           }
           .btn-github { background: #24292e; color: white; }
           .btn-github:hover { background: #2f363d; }
           .btn-bilibili { background: #fb7299; color: white; }
           .btn-bilibili:hover { background: #fc8dae; }
           .btn-hexo { background: #0e83cd; color: white; }
           .btn-hexo:hover { background: #1a9cf0; }
           .btn-butterfly { background: #ff7c7c; color: white; }
           .btn-butterfly:hover { background: #ff9696; }
           .blog-btn i { font-size: 16px; }
         </style>
         <div class="blog-buttons">
           <a href="https://github.com/cn177" target="_blank" class="blog-btn btn-github">
             <i class="fab fa-github"></i> GitHub
           </a>
           <a href="https://space.bilibili.com/515843270" target="_blank" class="blog-btn btn-bilibili">
             <i class="fab fa-bilibili"></i> 哔哩哔哩
           </a>
           <a href="https://github.com/hexojs/hexo" target="_blank" class="blog-btn btn-hexo">
             <i class="fab fa-github"></i> Hexo
           </a>
           <a href="https://github.com/jerryc127/hexo-theme-butterfly" target="_blank" class="blog-btn btn-butterfly">
             <i class="fab fa-github"></i> Butterfly
           </a>
         </div>
       </div>'
