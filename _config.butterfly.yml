# =====================================
# 头像
# =====================================
avatar:
  img: /img/avator.png   # 先把图片上传到 source/img/

# =====================================
# 导航菜单
# =====================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tag
  关于: /about/ || fas fa-heart

# =====================================
# 页脚
# =====================================
footer:
  owner:
    enable: true
    since: 2026
  copyright: true

# =====================================
# 侧边栏
# =====================================
aside:
  enable: true
  position: right
  
  card_author:
    enable: true
    description: 你好，我是 cn177
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/cn177
  
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！<br>这里啥都有，随便看看。
  
  card_recent_post:
    enable: true
    limit: 5
  
  card_categories:
    enable: true
    limit: 8
  
  card_tags:
    enable: true
    limit: 20
  
  card_webinfo:
    enable: true

# =====================================
# 背景（先给你纯色，稳一点）
# =====================================
background:
  enable: true
  color: "#1a1a2e"

# =====================================
# 代码高亮主题
# =====================================
highlight_theme: atom-one-dark

# =====================================
# 复制代码按钮
# =====================================
copy_btn: true

# =====================================
# 文章版权信息
# =====================================
post_copyright:
  enable: true
  license: CC BY-NC 4.0

# =====================================
# 文章字数统计
# =====================================
wordcount:
  enable: true
  count: true
  time: true

# =====================================
# 加载动画（吃豆人已关）
# =====================================
preloader:
  enable: false

# =====================================
# 社交链接
# =====================================
social:
  github: https://github.com/cn177 || fab fa-github

# =====================================
# 顶部图（随机风景图）
# =====================================
default_top_img: https://picsum.photos/1920/400?random=1
archive_top_img: https://picsum.photos/1920/400?random=2
tag_top_img: https://picsum.photos/1920/400?random=3
category_top_img: https://picsum.photos/1920/400?random=4

# =====================================
# 右下角按钮
# =====================================
rightside:
  enable: true

# =====================================
# 本地搜索
# =====================================
local_search:
  enable: true

# =====================================
# 图片懒加载
# =====================================
lazyload:
  enable: true
